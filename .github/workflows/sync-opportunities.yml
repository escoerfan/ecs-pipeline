name: Sync Close Opportunities

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Opportunities abrufen
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python scripts/fetch_opportunities.py

      - name: Aenderungen committen
        run: |
          git config user.name "ecs-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/opportunities.json
          git diff --staged --quiet || git commit -m "Sync Opportunities $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
